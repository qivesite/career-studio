<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Campaign Tracker — Guitar Hero Progress</title>
    <!-- Bootstrap 5 Dark Theme + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            transition: all 0.2s ease;
        }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            position: relative;
            color: #f0f0f0;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.75);
            backdrop-filter: blur(3px);
            z-index: -1;
        }
        /* Sticky info panel (left side) */
        .info-panel {
            position: sticky;
            top: 20px;
            background: rgba(20, 22, 32, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(108, 92, 231, 0.5);
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            color: #f0f0f0;
            transition: all 0.3s;
        }
        .total-stars-card {
            background: linear-gradient(135deg, #2c2e3a 0%, #1e1f2c 100%);
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
            margin-top: 1rem;
        }
        .total-stars-number {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd966;
            line-height: 1;
        }
        .block-card {
            background: rgba(20, 22, 32, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            border-left: 6px solid #9b59b6;
            margin-bottom: 1.8rem;
            overflow: hidden;
            position: relative;
            transition: 0.2s;
            text-align: center;
        }
        .block-card.locked {
            opacity: 1;
            pointer-events: none;
            position: relative;
        }
        .block-card.unlocked {
            pointer-events: auto;
            border-left-color: #f1c40f;
        }
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            border-radius: 1.5rem;
            pointer-events: none;
            text-align: center;
            padding: 1rem;
        }
        .lock-overlay i {
            font-size: 3.5rem;
            color: #f39c12;
            text-shadow: 0 0 5px black;
        }
        .lock-overlay strong, .lock-overlay small {
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 10px;
            border-radius: 30px;
            margin-top: 8px;
            font-weight: bold;
            color: white;
        }
        .track-item {
            background: rgba(15, 17, 26, 0.7);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.7rem;
            margin-left: 12px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #2c2f3c;
            transition: 0.1s;
            text-align: left;
        }
        .track-item:last-child {
            margin-bottom: 1rem;
        }
        .track-item:hover {
            background: #262a3a;
            border-color: #f39c12;
        }
        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .difficulty-circles {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #ffd966;
        }
        .stars-input {
            width: 90px;
            background: #262b38;
            border: 1px solid #f39c12;
            color: #ffd966;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
        }
        .stars-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(243,156,18,0.5);
        }
        .block-cover-lg {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 24px;
            background: #2c2e3a;
            border: 2px solid #9b59b6;
            margin: 20px auto 10px auto;
            display: block;
        }
        .campaign-cover-dynamic {
            width: 100%;
            object-fit: contain;
            border-radius: 20px;
            background: #1e1f2c;
            margin-bottom: 12px;
        }
        .btn-soundpack {
            background: #2ecc71;
            border: none;
            color: #1e2a1f;
            font-weight: bold;
        }
        .btn-soundpack:hover {
            background: #27ae60;
            transform: scale(1.02);
        }
        @keyframes glow {
            0% { box-shadow: 0 0 0 0 rgba(243,156,18,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(243,156,18,0); }
            100% { box-shadow: 0 0 0 0 rgba(243,156,18,0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); background: rgba(243,156,18,0); }
            50% { transform: scale(1.02); background: rgba(243,156,18,0.2); }
            100% { transform: scale(1); background: rgba(243,156,18,0); }
        }
        .unlock-animation {
            animation: glow 0.6s ease-out;
        }
        .star-input-changed {
            animation: pulse 0.3s ease;
        }
        .congrats-banner {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            color: #1e1f2c;
            font-weight: bold;
            padding: 10px;
            border-radius: 40px;
            margin-top: 15px;
            text-align: center;
            animation: glow 0.8s ease;
        }
        .footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            color: #a0a3b8;
        }
        @media (max-width: 768px) {
            .info-panel {
                position: relative;
                top: 0;
                margin-bottom: 1rem;
            }
            .total-stars-card {
                position: sticky;
                top: 10px;
                z-index: 100;
            }
            .block-cover-lg {
                width: 120px;
                height: 120px;
            }
            .track-item {
                margin-left: 6px;
                margin-right: 6px;
            }
        }
        .text-light-50 {
            color: #dddddd !important;
        }
        .card-title, h4, h3, p, label {
            color: #f0f0f0;
        }
        .alert-dark {
            background: #2c2e3a;
            color: #ccc;
        }
        .block-name-center {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }
    </style>

<body class="container py-4" id="appBody">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="display-6 fw-bold text-white"><i class="bi bi-trophy-fill text-warning me-2"></i>Campaign Tracker</h1>
        <div>
            <a href="/career-studio/index.html" class="btn btn-success">Go home page</a>
			<label class="btn btn-outline-light me-2" for="loadJsonTracker"><i class="bi bi-upload"></i> Load JSON</label>
            <input type="file" id="loadJsonTracker" accept="application/json" style="display: none;">
            <label class="btn btn-outline-light me-2" for="loadProgressFile"><i class="bi bi-folder-open"></i> Load saved progress</label>
            <input type="file" id="loadProgressFile" accept="application/json" style="display: none;">
            <button class="btn btn-primary" id="saveProgressBtn"><i class="bi bi-save"></i> Save results</button>
        </div>
    </div>

    <!-- Main grid: left side info panel, right side blocks -->
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="info-panel" id="infoPanel">
                <div id="campaignInfoContent">
                    <p class="">No campaign loaded</p>
                </div>
                <div class="total-stars-card" id="totalStarsCard">
                    <i class="bi bi-star-fill text-warning fs-3"></i>
                    <div class="total-stars-number" id="totalStarsValue">0</div>
                    <div>Total Stars Earned</div>
                </div>
                <div id="congratsMessage" style="min-height: 60px;"></div>
            </div>
        </div>
        <div class="col-lg-8">
            <div id="blocksGrid" class="row g-3">
                <div class="col-12 text-center">Load a campaign JSON to start tracking your stars.</div>
            </div>
        </div>
    </div>
    <div class="footer">
        <button class="btn btn-outline-danger btn-sm" id="resetStarsBtn"><i class="bi bi-trash"></i> Reset all stars</button>
        <span class="ms-3"><i class="bi bi-music-note-beamed"></i> Earn stars by playing songs (any number), unlock new stages! Progress auto-saved.</span>
    </div>

    <script>
        let campaign = null;           
        let userStars = {};            
        let totalStars = 0;

        function circlesDisplay(level, max = 6) {
            let filled = '●'.repeat(level);
            let empty = '○'.repeat(max - level);
            return filled + empty;
        }

        function loadCampaign(jsonData) {
            campaign = jsonData;
            userStars = {};
            totalStars = 0;
            if (campaign && campaign.blocks) {
                campaign.blocks.forEach(block => {
                    if (block.tracks) {
                        block.tracks.forEach(track => {
                            userStars[track.id] = 0;
                        });
                    }
                });
            }
            recalcTotalStars();
            saveToLocalStorage();
            renderUI();
        }

        function recalcTotalStars() {
            totalStars = Object.values(userStars).reduce((sum, val) => {
                let num = parseFloat(val);
                if (isNaN(num)) num = 0;
                return sum + num;
            }, 0);
            document.getElementById('totalStarsValue').innerText = Math.floor(totalStars);
            return totalStars;
        }

        function checkAllTracksCompleted() {
            if (!campaign || !campaign.blocks) return false;
            let allTracks = [];
            campaign.blocks.forEach(block => {
                if (block.tracks) allTracks.push(...block.tracks);
            });
            if (allTracks.length === 0) return false;
            return allTracks.every(track => {
                let stars = userStars[track.id];
                return stars !== undefined && stars !== null && parseFloat(stars) > 0;
            });
        }

        function updateCongratsMessage() {
            const container = document.getElementById('congratsMessage');
            if (!campaign) {
                container.innerHTML = '';
                return;
            }
            if (checkAllTracksCompleted()) {
                container.innerHTML = `<div class="congrats-banner"><i class="bi bi-trophy-fill"></i> CONGRATULATIONS! You've completed the entire campaign! 🎸🔥</div>`;
            } else {
                container.innerHTML = '';
            }
        }

        function checkAndTriggerUnlockAnimations(prevTotalStars) {
            if (!campaign || !campaign.blocks) return;
            const newTotal = totalStars;
            campaign.blocks.forEach(block => {
                const wasUnlocked = prevTotalStars >= block.unlockCost;
                const isUnlocked = newTotal >= block.unlockCost;
                if (!wasUnlocked && isUnlocked) {
                    const blockElement = document.querySelector(`.block-card[data-block-id="${block.id}"]`);
                    if (blockElement) {
                        blockElement.classList.add('unlock-animation');
                        setTimeout(() => blockElement.classList.remove('unlock-animation'), 600);
                        showToast(`🎸 ${block.name} UNLOCKED!`, 'success');
                    }
                }
            });
        }

        function showToast(message, type = 'info') {
            const toastDiv = document.createElement('div');
            toastDiv.className = `alert alert-${type} position-fixed bottom-0 end-0 m-3 shadow-lg`;
            toastDiv.style.zIndex = 9999;
            toastDiv.style.background = type === 'success' ? '#2ecc71' : '#3498db';
            toastDiv.style.color = 'white';
            toastDiv.style.fontWeight = 'bold';
            toastDiv.innerHTML = `<i class="bi bi-gift-fill me-2"></i> ${message}`;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 2500);
        }

        function renderUI() {
            if (!campaign || !campaign.blocks) {
                document.getElementById('blocksGrid').innerHTML = '<div class="col-12 text-center fs-3">No campaign loaded. Please load a valid JSON file.</div>';
                document.getElementById('campaignInfoContent').innerHTML = '<p class="">No campaign loaded</p>';
                document.getElementById('totalStarsValue').innerText = '0';
                updateCongratsMessage();
                return;
            }

            renderInfoPanel();
            const blocksGrid = document.getElementById('blocksGrid');
            blocksGrid.innerHTML = '';
            campaign.blocks.forEach(block => {
                const isUnlocked = totalStars >= block.unlockCost;
                const cardClass = isUnlocked ? 'unlocked' : 'locked';
                const lockOverlay = !isUnlocked ? `
                    <div class="lock-overlay">
                        <i class="bi bi-question-circle-fill"></i>
                        <strong>🔒 LOCKED</strong>
                        <small>Need ${block.unlockCost - Math.floor(totalStars)} more stars</small>
                    </div>
                ` : '';

                const coverHtml = block.coverUrl ? `<img src="${escapeHtml(block.coverUrl)}" class="block-cover-lg" alt="cover" onerror="this.src='https://placehold.co/180x180/2c2e3a/9b59b6?text=?'">` : `<div class="block-cover-lg bg-secondary d-flex align-items-center justify-content-center"><i class="bi bi-collection fs-1"></i></div>`;

                let tracksHtml = '';
                if (block.tracks && block.tracks.length) {
                    block.tracks.forEach(track => {
                        const currentStars = userStars[track.id] !== undefined ? userStars[track.id] : 0;
                        const difficultyCircles = circlesDisplay(track.difficulty, 6);
                        tracksHtml += `
                            <div class="track-item" data-track-id="${track.id}">
                                <div class="track-info">
                                    <i class="bi bi-music-note text-info"></i>
                                    <strong>${escapeHtml(track.name)}</strong>
                                    <span class="difficulty-circles" title="Song difficulty">${difficultyCircles}</span>
                                </div>
                                <div>
                                    <input type="number" class="stars-input" data-track-id="${track.id}" value="${currentStars}" step="1" ${!isUnlocked ? 'disabled' : ''}>
                                    <span class="ms-1">★</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    tracksHtml = `<div class="alert alert-dark text-center small mx-3 mb-3">No songs in this setlist.</div>`;
                }

                const blockCard = `
                    <div class="col-12">
                        <div class="block-card ${cardClass}" data-block-id="${block.id}" style="position: relative;">
                            ${lockOverlay}
                            ${coverHtml}
                            <div class="card-body">
                                <h4 class="fw-bold text-light block-name-center">${escapeHtml(block.name)}</h4>
                                <small class="text-warning d-block text-center mb-3"><i class="bi bi-star-fill"></i> Unlock cost: ${block.unlockCost} stars</small>
                                <div class="mt-2">
                                    <h6><i class="bi bi-list-ul"></i> Setlist</h6>
                                    ${tracksHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                blocksGrid.innerHTML += blockCard;
            });

            document.querySelectorAll('.stars-input').forEach(input => {
                input.removeEventListener('change', handleStarChange);
                input.addEventListener('change', handleStarChange);
            });
            updateCongratsMessage();
        }

        function handleStarChange(e) {
            const input = e.target;
            const trackId = input.getAttribute('data-track-id');
            let val = parseFloat(input.value);
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            input.value = val;
            const prevTotal = totalStars;
            userStars[trackId] = val;
            recalcTotalStars();
            checkAndTriggerUnlockAnimations(prevTotal);
            saveToLocalStorage();
            const trackItem = input.closest('.track-item');
            if (trackItem) {
                trackItem.classList.add('star-input-changed');
                setTimeout(() => trackItem.classList.remove('star-input-changed'), 300);
            }
            renderUI();
        }

        function renderInfoPanel() {
            const panel = document.getElementById('campaignInfoContent');
            if (!campaign) {
                panel.innerHTML = '<p class="">No campaign loaded</p>';
                return;
            }
            let html = '';
            if (campaign.coverUrl) {
                html += `<img src="${escapeHtml(campaign.coverUrl)}" class="campaign-cover-dynamic" alt="cover" onerror="this.src='https://placehold.co/600x300/2c2e3a/9b59b6?text=no+cover'">`;
            }
            html += `<h3 class="text-warning">${escapeHtml(campaign.name || 'Untitled Campaign')}</h3>`;
            if (campaign.description) html += `<p class="small text-light-50">${escapeHtml(campaign.description)}</p>`;
            if (campaign.instrument) html += `<p><i class="bi bi-guitar-fill"></i> <strong>Instrument:</strong> ${escapeHtml(campaign.instrument)}</p>`;
            if (campaign.soundpackLink) {
                html += `<a href="${escapeHtml(campaign.soundpackLink)}" target="_blank" class="btn btn-soundpack btn-sm w-100 mt-2"><i class="bi bi-download"></i> Download Soundpack</a>`;
            }
            if (campaign.backgroundImageUrl && campaign.backgroundImageUrl.trim() !== '') {
                document.body.style.backgroundImage = `url('${escapeHtml(campaign.backgroundImageUrl)}')`;
            } else {
                document.body.style.backgroundImage = "url('https://placehold.co/1920x1080/1a1e2a/6c5ce7?text=GUITAR+HERO+BACKGROUND&font=montserrat')";
            }
            panel.innerHTML = html;
        }

        function resetAllStars() {
            if (!campaign) {
                showToast('No campaign loaded', 'warning');
                return;
            }
            if (confirm('Are you sure? This will reset all stars earned for every song.')) {
                for (let trackId in userStars) {
                    userStars[trackId] = 0;
                }
                recalcTotalStars();
                saveToLocalStorage();
                renderUI();
                showToast('All stars have been reset!', 'info');
            }
        }

        function saveToLocalStorage() {
            if (!campaign) return;
            const saveData = {
                campaign: campaign,
                userStars: userStars,
                totalStars: totalStars,
                lastUpdated: Date.now()
            };
            localStorage.setItem('campaignTrackerProgress', JSON.stringify(saveData));
        }

        function loadFromLocalStorage() {
            const raw = localStorage.getItem('campaignTrackerProgress');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                if (data.campaign && data.userStars) {
                    campaign = data.campaign;
                    userStars = data.userStars;
                    totalStars = data.totalStars || 0;
                    recalcTotalStars();
                    renderUI();
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function handleCampaignUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    if (json && (json.blocks || json.name)) {
                        if (json.blocks) {
                            json.blocks.forEach(block => {
                                if (!block.id) block.id = Date.now() + '-' + Math.random();
                                if (block.tracks) {
                                    block.tracks.forEach(track => {
                                        if (!track.id) track.id = Date.now() + '-' + Math.random();
                                        if (track.difficulty < 1) track.difficulty = 1;
                                        if (track.difficulty > 6) track.difficulty = 6;
                                    });
                                }
                            });
                        }
                        loadCampaign(json);
                        showToast('Campaign loaded successfully!', 'success');
                    } else {
                        alert('Invalid campaign JSON: missing blocks or name.');
                    }
                } catch (err) {
                    alert('Error parsing JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function handleProgressUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.userStars && campaign) {
                        const newUserStars = { ...userStars };
                        for (const [trackId, stars] of Object.entries(data.userStars)) {
                            let exists = false;
                            if (campaign && campaign.blocks) {
                                for (const block of campaign.blocks) {
                                    if (block.tracks && block.tracks.some(t => t.id === trackId)) {
                                        exists = true;
                                        break;
                                    }
                                }
                            }
                            if (exists) {
                                newUserStars[trackId] = parseFloat(stars) || 0;
                            }
                        }
                        userStars = newUserStars;
                        recalcTotalStars();
                        saveToLocalStorage();
                        renderUI();
                        showToast('Progress loaded and merged!', 'success');
                    } else {
                        alert('Invalid progress file or no campaign loaded. Please load campaign first.');
                    }
                } catch (err) {
                    alert('Error parsing progress file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function exportProgress() {
            if (!campaign) {
                alert('No campaign loaded.');
                return;
            }
            const exportData = {
                campaignName: campaign.name,
                exportedAt: new Date().toISOString(),
                userStars: userStars,
                totalStars: totalStars
            };
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = (campaign.name ? campaign.name.replace(/[^a-z0-9]/gi, '_') : 'progress') + '_progress.json';
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Progress saved to file!', 'info');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        document.getElementById('loadJsonTracker').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleCampaignUpload(e.target.files[0]);
                e.target.value = '';
            }
        });
        document.getElementById('loadProgressFile').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleProgressUpload(e.target.files[0]);
                e.target.value = '';
            }
        });
        document.getElementById('saveProgressBtn').addEventListener('click', exportProgress);
        document.getElementById('resetStarsBtn').addEventListener('click', resetAllStars);

        if (!loadFromLocalStorage()) {
            campaign = null;
            renderUI();
        }

        window.addEventListener('beforeunload', () => {
            if (campaign) saveToLocalStorage();
        });
    </script>
</body>
